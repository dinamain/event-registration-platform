services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - SECRET_KEY=docker-dev-secret-key
      - DEBUG=True
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - CORS_ALLOWED_ORIGINS=http://localhost:3000
    volumes:
      - ./db.sqlite3:/app/db.sqlite3

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:8000/api
    ports:
      - "3000:80"
    depends_on:
      - backend